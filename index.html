<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AP Microeconomics Study Lab</title>
  <style>
    :root {
      --bg: #071013;
      --panel: #101a20;
      --panel-2: #15242c;
      --text: #edf7f5;
      --muted: #9db0b4;
      --line: rgba(255,255,255,.1);
      --accent: #2dd4bf;
      --accent-2: #f5c542;
      --good: #49d17d;
      --bad: #ff6b6b;
      --warn: #ffb86b;
      --demand: #6ee7f9;
      --supply: #fb7185;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 16px;
      --nav-width: 290px;
    }
    [data-theme="light"] {
      --bg: #f5f8fb;
      --panel: #ffffff;
      --panel-2: #edf4f7;
      --text: #132027;
      --muted: #5b6c72;
      --line: rgba(19,32,39,.12);
      --shadow: 0 18px 45px rgba(24,50,60,.12);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(45,212,191,.18), transparent 32rem),
        linear-gradient(135deg, rgba(245,197,66,.08), transparent 26rem),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 12px;
      color: var(--text);
      background: var(--panel-2);
      padding: .74rem .9rem;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease, opacity .18s ease;
    }
    button:hover { transform: translateY(-1px); background: rgba(45,212,191,.17); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .primary { background: linear-gradient(135deg, var(--accent), #32a9ff); color: #031113; font-weight: 800; }
    .danger { background: rgba(255,107,107,.18); color: #ffd1d1; }
    .ghost { background: transparent; border: 1px solid var(--line); }
    .app { display: grid; grid-template-columns: var(--nav-width) 1fr; min-height: 100vh; }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 1.1rem;
      border-right: 1px solid var(--line);
      background: rgba(7,16,19,.78);
      backdrop-filter: blur(16px);
      z-index: 20;
      overflow-y: auto;
    }
    [data-theme="light"] .sidebar { background: rgba(245,248,251,.86); }
    .brand { display: flex; gap: .75rem; align-items: center; margin-bottom: 1rem; }
    .logo {
      width: 44px; height: 44px; border-radius: 14px;
      display: grid; place-items: center;
      color: #031113; font-weight: 900;
      background: conic-gradient(from 120deg, var(--accent), #7dd3fc, var(--accent-2), var(--accent));
      box-shadow: var(--shadow);
    }
    .brand h1 { font-size: 1.02rem; margin: 0; line-height: 1.1; }
    .brand span { color: var(--muted); font-size: .78rem; }
    .nav { display: grid; gap: .35rem; }
    .nav button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: .65rem;
      justify-content: flex-start;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      padding: .72rem .78rem;
    }
    .nav button.active, .nav button:hover { color: var(--text); background: rgba(45,212,191,.12); }
    .side-actions { display: grid; gap: .55rem; margin-top: 1rem; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.35rem;
      border-bottom: 1px solid var(--line);
      background: rgba(7,16,19,.72);
      backdrop-filter: blur(16px);
    }
    [data-theme="light"] .topbar { background: rgba(245,248,251,.84); }
    .hamburger { display: none; }
    .search { position: relative; flex: 1; max-width: 560px; }
    .search input, .field input, .field select, textarea {
      width: 100%;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: .78rem .9rem;
      outline: none;
    }
    .search input:focus, .field input:focus, .field select:focus { border-color: rgba(45,212,191,.65); box-shadow: 0 0 0 4px rgba(45,212,191,.12); }
    main { min-width: 0; }
    .content { padding: 1.35rem; max-width: 1500px; margin: 0 auto; }
    .view { display: none; animation: fade .22s ease; }
    .view.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
    .crumbs { color: var(--muted); font-size: .86rem; margin-bottom: 1rem; }
    .hero {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 1rem;
      align-items: stretch;
      margin-bottom: 1rem;
    }
    .hero-panel, .card, .stat, .lesson-block, .quiz-shell, .modal-card {
      background: linear-gradient(180deg, rgba(255,255,255,.035), transparent), var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero-panel { padding: 1.4rem; overflow: hidden; position: relative; }
    .hero-panel h2 { font-size: clamp(1.7rem, 4vw, 3.4rem); line-height: 1; margin: .25rem 0 .8rem; letter-spacing: 0; }
    .hero-panel p { color: var(--muted); max-width: 64ch; line-height: 1.55; margin: 0 0 1rem; }
    .hero-actions { display: flex; gap: .65rem; flex-wrap: wrap; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: .75rem; }
    .stat { padding: 1rem; }
    .stat strong { display: block; font-size: 1.55rem; }
    .stat span { color: var(--muted); font-size: .86rem; }
    .grid { display: grid; gap: 1rem; }
    .unit-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card { padding: 1rem; position: relative; overflow: hidden; }
    .unit-card { animation: liftIn .42s ease both; }
    .unit-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: var(--unit-color, var(--accent));
    }
    @keyframes liftIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .card h3, .card h4 { margin: .15rem 0 .55rem; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      gap: .35rem;
      align-items: center;
      padding: .32rem .55rem;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .row { display: flex; align-items: center; gap: .65rem; flex-wrap: wrap; }
    .between { justify-content: space-between; }
    .progress {
      height: 10px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
      margin: .7rem 0;
    }
    .progress > i {
      display: block;
      width: var(--p, 0%);
      height: 100%;
      background: linear-gradient(90deg, var(--unit-color, var(--accent)), var(--accent-2));
      border-radius: inherit;
    }
    .section-title { display: flex; justify-content: space-between; align-items: end; gap: 1rem; margin: 1.25rem 0 .75rem; }
    .section-title h2 { margin: 0; }
    .lesson-layout { display: grid; grid-template-columns: 260px 1fr; gap: 1rem; }
    .unit-tabs { position: sticky; top: 86px; align-self: start; display: grid; gap: .45rem; }
    .unit-tabs button { text-align: left; border-left: 4px solid transparent; }
    .unit-tabs button.active { border-left-color: var(--unit-color); background: rgba(45,212,191,.12); }
    .lesson-block { padding: 1rem; margin-bottom: 1rem; }
    .lesson-block h3 { margin-top: 0; }
    .lesson-block li { margin: .45rem 0; line-height: 1.5; }
    .term-grid, .formula-grid, .graph-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .term-card { cursor: pointer; }
    .term-card:hover { transform: translateY(-2px); }
    .formula { font-size: 1.05rem; font-weight: 800; color: var(--accent-2); }
    .graph-card svg {
      width: 100%;
      height: auto;
      min-height: 230px;
      background: rgba(0,0,0,.13);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .axis { stroke: var(--muted); stroke-width: 2; marker-end: url(#arrow); }
    .curve-demand { stroke: var(--demand); stroke-width: 3; fill: none; }
    .curve-supply { stroke: var(--supply); stroke-width: 3; fill: none; }
    .curve-alt { stroke: var(--accent-2); stroke-width: 3; fill: none; }
    .graph-text { fill: var(--text); font-size: 13px; font-weight: 700; }
    .shade-blue { fill: rgba(110,231,249,.22); }
    .shade-red { fill: rgba(251,113,133,.22); }
    .shade-yellow { fill: rgba(245,197,66,.24); }
    .quiz-shell { padding: 1rem; }
    .setup-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: .8rem; }
    .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .35rem; }
    .answer-list { display: grid; gap: .65rem; margin: 1rem 0; }
    .answer {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--panel-2);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .7rem;
      align-items: start;
    }
    .answer.correct { background: rgba(73,209,125,.15); border-color: rgba(73,209,125,.55); }
    .answer.wrong { background: rgba(255,107,107,.14); border-color: rgba(255,107,107,.55); }
    .feedback {
      padding: .9rem;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      margin: .75rem 0;
    }
    .timer { font-variant-numeric: tabular-nums; font-weight: 900; color: var(--accent-2); }
    .flashcard {
      min-height: 230px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 1.2rem;
      cursor: pointer;
      user-select: none;
    }
    .flashcard strong { font-size: 1.45rem; }
    .history-item { display: grid; grid-template-columns: 1fr auto; gap: .75rem; align-items: center; }
    .kbd { padding: .15rem .35rem; border: 1px solid var(--line); border-radius: 6px; background: rgba(255,255,255,.06); color: var(--muted); font-size: .78rem; }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 1rem;
      background: rgba(0,0,0,.58);
      z-index: 50;
    }
    .modal.active { display: grid; }
    .modal-card { width: min(720px, 100%); padding: 1rem; max-height: 86vh; overflow: auto; }
    .command-list { display: grid; gap: .45rem; margin-top: .75rem; }
    .command-list button { text-align: left; }
    .confetti {
      position: fixed;
      width: 9px;
      height: 12px;
      pointer-events: none;
      z-index: 90;
      animation: confetti 1.7s ease-out forwards;
    }
    @keyframes confetti { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    .compact .card, .compact .lesson-block, .compact .quiz-shell { padding: .75rem; }
    .compact .content { padding: .8rem; }
    .focus .sidebar, .focus .topbar .search, .focus .topbar .row, .focus .hamburger { display: none; }
    .focus .app { grid-template-columns: 1fr; }
    .focus .topbar { justify-content: center; }
    .focus-exit { display: none; }
    .focus .focus-exit { display: inline-flex; }
    .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin: .75rem 0 1rem; }
    .auth-tabs button.active { background: rgba(45,212,191,.18); border: 1px solid rgba(45,212,191,.35); }
    .auth-form { display: grid; gap: .75rem; }
    .auth-form.hidden { display: none; }
    .auth-status { min-height: 1.3rem; color: var(--muted); }
    .account-pill { max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
    .empty { padding: 2rem; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: var(--radius); }
    @media (max-width: 1050px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        transform: translateX(-105%);
        transition: transform .2s ease;
        width: min(88vw, 320px);
      }
      .sidebar.open { transform: none; }
      .hamburger { display: inline-flex; }
      .hero, .lesson-layout, .unit-grid, .two, .three, .term-grid, .formula-grid, .graph-grid { grid-template-columns: 1fr; }
      .unit-tabs { position: static; grid-template-columns: repeat(2, minmax(0,1fr)); }
      .setup-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 620px) {
      .topbar { padding: .75rem; }
      .search { display: none; }
      .setup-grid, .stats-grid { grid-template-columns: 1fr; }
      .unit-tabs { grid-template-columns: 1fr; }
      button { padding: .68rem .78rem; }
      .hero-panel h2 { font-size: 2rem; }
    }
    @media print {
      body { background: white; color: black; }
      .sidebar, .topbar, .hero-actions, .no-print { display: none !important; }
      .app { display: block; }
      .view { display: block !important; page-break-after: always; }
      .card, .lesson-block, .hero-panel, .quiz-shell { box-shadow: none; border: 1px solid #ccc; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">µ</div>
        <div><h1>AP Micro Study Lab</h1><span>Units 1-6, offline</span></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-actions">
        <button class="primary" data-action="smartQuiz">⚡ Smart quiz</button>
        <button class="ghost" data-action="toggleTheme">◐ Dark / light</button>
        <button class="ghost" data-action="toggleCompact">▤ Compact mode</button>
        <button class="ghost" data-action="toggleFocus">◎ Focus mode</button>
        <button class="ghost" data-action="openAuth" id="authSideBtn">Sign in / sign up</button>
        <button class="ghost" data-action="syncProgress" id="syncSideBtn">Sync progress</button>
        <button class="danger" data-action="logout" id="logoutSideBtn" style="display:none">Log out</button>
      </div>
    </aside>
    <main>
      <header class="topbar">
        <button class="hamburger ghost" id="menuBtn">☰</button>
        <button class="focus-exit primary" data-action="toggleFocus">Exit focus mode</button>
        <div class="search">
          <input id="globalSearch" type="search" placeholder="Search terms, formulas, topics...  /">
        </div>
        <div class="row">
          <button class="ghost account-pill" data-action="openAuth" id="accountBtn">Not signed in</button>
          <span class="pill" id="streakPill">🔥 0 day streak</span>
          <button class="ghost" data-action="openCommand">⌘K</button>
        </div>
      </header>
      <div class="content">
        <div class="crumbs" id="crumbs">Home Dashboard</div>
        <section class="view active" id="homeView"></section>
        <section class="view" id="lessonsView"></section>
        <section class="view" id="termsView"></section>
        <section class="view" id="formulasView"></section>
        <section class="view" id="graphsView"></section>
        <section class="view" id="quizView"></section>
        <section class="view" id="examView"></section>
        <section class="view" id="frqView"></section>
        <section class="view" id="mistakesView"></section>
        <section class="view" id="progressView"></section>
        <section class="view" id="flashcardsView"></section>
        <section class="view" id="historyView"></section>
        <section class="view" id="dailyView"></section>
        <section class="view" id="cheatView"></section>
      </div>
    </main>
  </div>

  <div class="modal" id="termModal"><div class="modal-card" id="termModalBody"></div></div>
  <div class="modal" id="authModal"><div class="modal-card">
    <div class="row between"><h2 style="margin:0">Account</h2><button class="ghost" data-action="closeModals">×</button></div>
    <p class="muted">Create an account to save your quiz history, FRQ self-scores, mistakes, lessons, badges, and tracker progress to your Cloudflare D1 database.</p>
    <div class="auth-tabs">
      <button class="active" id="loginTab" data-action="switchAuth" data-auth-mode="login">Login</button>
      <button id="signupTab" data-action="switchAuth" data-auth-mode="signup">Sign up</button>
    </div>
    <form class="auth-form" id="loginForm">
      <div class="field"><label>Username</label><input id="loginUsername" autocomplete="username" placeholder="username"></div>
      <div class="field"><label>Password</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="password"></div>
      <button class="primary" data-action="login" type="button">Login</button>
    </form>
    <form class="auth-form hidden" id="signupForm">
      <div class="setup-grid">
        <div class="field"><label>First name</label><input id="signupFirst" autocomplete="given-name" placeholder="First name"></div>
        <div class="field"><label>Last name</label><input id="signupLast" autocomplete="family-name" placeholder="Last name"></div>
      </div>
      <div class="field"><label>Username</label><input id="signupUsername" autocomplete="username" placeholder="letters, numbers, underscore"></div>
      <div class="field"><label>Password</label><input id="signupPassword" type="password" autocomplete="new-password" placeholder="at least 8 characters"></div>
      <div class="field"><label>Re-enter password</label><input id="signupConfirm" type="password" autocomplete="new-password" placeholder="repeat password"></div>
      <button class="primary" data-action="register" type="button">Create account</button>
    </form>
    <p class="auth-status" id="authStatus"></p>
  </div></div>
  <div class="modal" id="commandModal"><div class="modal-card">
    <div class="row between"><h2 style="margin:0">Command Palette</h2><button class="ghost" data-action="closeModals">×</button></div>
    <input id="commandSearch" type="search" placeholder="Type a page, unit, quiz, graph, or formula..." style="margin-top:1rem">
    <div class="command-list" id="commandList"></div>
  </div></div>

    return `${axes}${sd}`;
  }
  function renderGraphs() {
    $("#graphsView").innerHTML = `<div class="section-title"><h2>Graph Guide</h2><span class="muted">Responsive SVG diagrams, no external assets</span></div>
      <div class="grid graph-grid">${graphs.map(g => `<article class="card graph-card"><span class="pill">Unit ${g[2]}</span><h3>${g[1]}</h3><svg viewBox="0 0 370 300" role="img" aria-label="${g[1]} graph">${graphSvg(g[0])}</svg><p>${g[3]}</p><p class="muted"><strong>Exam tip:</strong> ${g[4]}</p></article>`).join("")}</div>`;

  function renderQuizSetup(preset = {}) {
    $("#quizView").innerHTML = setupHtml("Practice Quiz", false, preset);
  }

    $("#examView").innerHTML = setupHtml("Final Review Exam", true, { source: "mixed", amount: 100, mode: "Exam mode" });

  function renderFrq() {
    const currentFilter = $("#frqUnitFilter")?.value || "all";
    const unitOptions = `<select id="frqUnitFilter"><option value="all" ${currentFilter==="all"?"selected":""}>All units</option>${units.map(u=>`<option value="${u.id}" ${String(u.id)===currentFilter?"selected":""}>Unit ${u.id}: ${u.title}</option>`).join("")}</select>`;
    const filtered = FRQ_BANK.filter(f => currentFilter === "all" || String(f.unit) === currentFilter);
    $("#frqView").innerHTML = `<div class="section-title"><h2>FRQ Practice</h2>${unitOptions}</div>
      <div class="lesson-block"><h3>How to Self-Grade</h3><p class="muted">AP Micro FRQs are scored point by point. Write your answer first, then compare to the rubric. Award each point only when your response clearly earns that specific point. The current exam uses one long FRQ worth half of the FRQ section and two short FRQs worth one quarter each.</p></div>
      <div class="grid two">${filtered.map(f=>frqCard(f, FRQ_BANK.indexOf(f))).join("")}</div>
      <div class="section-title"><h2>FRQ History</h2><span class="muted">${(state.frqAttempts||[]).length} saved self-scores</span></div>
      <div class="grid">${(state.frqAttempts||[]).slice(0,8).map(a=>`<article class="card"><strong>${esc(a.title)}</strong><p class="muted">${new Date(a.date).toLocaleString()} • ${a.score}/${a.points} points</p></article>`).join("") || empty("No FRQ self-scores yet.")}</div>`;
    $("#frqUnitFilter")?.addEventListener("change", renderFrq);

  function frqCard(f, i) {
    return `<article class="card"><span class="pill">Unit ${f.unit}</span><span class="pill">${f.points} points</span><h3>${esc(f.title)}</h3>
      <ol>${f.prompt.map(p=>`<li>${esc(p)}</li>`).join("")}</ol>
      <textarea id="frqAnswer${i}" rows="7" placeholder="Write your FRQ response here before opening the answer..."></textarea>
      <div class="row" style="margin-top:.75rem"><button class="primary" data-action="showFrqRubric" data-frq="${i}">Finish and self-grade</button></div>
      <div id="frqRubric${i}" style="display:none;margin-top:.8rem">
        <div class="feedback"><strong>Model answer:</strong><p>${esc(f.model)}</p></div>
        <h4>Rubric checklist</h4>${f.rubric.map((r,idx)=>`<label class="card" style="display:flex;gap:.6rem;align-items:flex-start;margin:.4rem 0;box-shadow:none"><input type="checkbox" data-frq-point="${idx}"> <span>${esc(r)}</span></label>`).join("")}
        <div class="row"><button class="primary" data-action="saveFrqScore" data-frq="${i}">Save self-score</button><span class="pill" id="frqScore${i}">0/${f.points}</span></div>
      </div></article>`;
  }
  function setupHtml(title, final, preset) {
    return `<div class="quiz-shell"><div class="section-title"><h2>${title}</h2><span class="muted">Original questions, answer explanations, saved attempts</span></div>
      <div id="setupNotice" class="feedback" style="display:none"></div>
      <div class="setup-grid">
        ${field("Question source", "source", [["unit","Unit-specific quiz"],["mixed","Mixed units quiz"],["weak","Weak areas only"],["missed","Missed questions only"],["formula","Formula questions only"],["graph","Graph questions only"],["calculation","Calculation questions only"],["definition","Definitions only"]], preset.source || (final ? "mixed" : "unit"))}
        ${field("Unit", "unit", units.map(u=>[u.id,`Unit ${u.id}: ${u.title}`]), preset.unit || activeUnit)}
        ${field("Questions", "amount", [[5,"5 questions"],[10,"10 questions"],[15,"15 questions"],[20,"20 questions"],[25,"25 questions"],[50,"50 questions"],[100,"100 questions"],["custom","Custom amount"]], preset.amount || (final ? 100 : 15))}
        <div class="field"><label>Custom amount</label><input id="customAmount" type="number" min="1" value="${preset.amount || 20}"></div>
        ${field("Difficulty", "difficulty", [["Mixed difficulty","Mixed difficulty"],["Easy","Easy"],["Medium","Medium"],["Hard","Hard"],["AP-style challenge","AP-style challenge"]], preset.difficulty || "Mixed difficulty")}
        ${field("Mode", "mode", [["Study mode","Study mode"],["Exam mode","Exam mode"],["Timed mode","Timed mode"],["Speed round","Speed round"]], preset.mode || "Study mode")}
        ${field("Order", "order", [["random","Random"],["unit","Unit order"],["hardest","Hardest first"],["missed","Missed most often first"]], preset.order || "random")}
        ${field("Timer", "timer", [["none","No timer"],[30,"30 seconds per question"],[60,"60 seconds per question"],[90,"90 seconds per question"],["custom","Custom time"]], preset.timer || "none")}
        <div class="field"><label>Custom seconds</label><input id="customTimer" type="number" min="5" value="45"></div>
      </div>
      <div class="row" style="margin-top:1rem"><button class="primary" data-action="startQuiz" data-final="${final}">Start quiz</button><button data-action="randomQuestion">Random question generator</button><button data-action="smartQuiz">Smart quiz</button></div>
      <div id="quizRun" style="margin-top:1rem"></div>
    </div>`;
  }
  function field(label,id,opts,val){ return `<div class="field"><label>${label}</label><select id="${id}">${opts.map(o=>`<option value="${o[0]}" ${String(o[0])===String(val)?"selected":""}>${o[1]}</option>`).join("")}</select></div>`; }

  function selectQuestions(settings) {
    let pool = questionBank.slice();
    if (settings.source === "unit") pool = pool.filter(q => q.unit === Number(settings.unit));
    if (settings.source === "weak") {
      const weakUnits = getStats().unitAcc.filter(u => u.count && u.acc < 75).map(u => u.unit);
      pool = pool.filter(q => weakUnits.includes(q.unit));
      if (!pool.length) pool = questionBank.slice();
    }
    if (settings.source === "missed") {
      const ids = Object.keys(state.missed || {});
      pool = pool.filter(q => ids.includes(q.id));
      if (!pool.length) pool = questionBank.slice();
    }
    if (["formula","graph","calculation","definition"].includes(settings.source)) pool = pool.filter(q => q.type === settings.source);
    if (settings.difficulty !== "Mixed difficulty") pool = pool.filter(q => q.difficulty === settings.difficulty);
    if (!pool.length) pool = questionBank.slice();
    if (settings.order === "hardest") pool.sort((a,b) => difficultyRank(b.difficulty) - difficultyRank(a.difficulty));
    else if (settings.order === "unit") pool.sort((a,b) => a.unit - b.unit || a.id.localeCompare(b.id));
    else if (settings.order === "missed") pool.sort((a,b) => (state.missed[b.id]?.count || 0) - (state.missed[a.id]?.count || 0));
    else pool = shuffle(pool);
    const requested = Math.max(1, Number(settings.amount) || 10);
    const selected = pool.slice(0, Math.min(requested, pool.length)).map(q => ({ ...q, choices: shuffle(q.choices) }));
    return { selected, capped: requested > pool.length, available: pool.length, requested };
  }
  function difficultyRank(d){ return {"Easy":1,"Medium":2,"Hard":3,"AP-style challenge":4}[d] || 0; }
  function startQuiz(final = false, override = null, root = document) {
    const amountVal = $("#amount", root)?.value;
    const settings = override || {
      source: $("#source", root)?.value || (final ? "mixed" : "unit"),
      unit: $("#unit", root)?.value || activeUnit,
      amount: amountVal === "custom" ? $("#customAmount", root)?.value : amountVal,
      difficulty: $("#difficulty", root)?.value || "Mixed difficulty",
      mode: $("#mode", root)?.value || (final ? "Exam mode" : "Study mode"),
      order: $("#order", root)?.value || "random",
      timer: $("#timer", root)?.value || "none",
      customTimer: $("#customTimer", root)?.value || 45,
      final
    };
    const picked = selectQuestions(settings);
    const notice = $("#setupNotice", root);
    if (notice) {
      notice.style.display = picked.capped ? "block" : "none";
      notice.textContent = picked.capped ? `You asked for ${picked.requested}, but only ${picked.available} matched. Using all available questions.` : "";
    }
    currentQuiz = { settings, mount: $("#quizRun", root), questions: picked.selected, index: 0, answers: [], selected: null, start: Date.now(), done: false, same: picked.selected.map(q => q.id), timeLeft: timerSeconds(settings), timerId: null };
    renderQuizQuestion();
  }
  function timerSeconds(settings) {
    if (settings.mode === "Speed round") return 20;
    if (settings.timer === "custom") return Math.max(5, Number(settings.customTimer) || 45);
    if (settings.timer === "none" && settings.mode !== "Timed mode") return 0;
    return Number(settings.timer) || 60;
  }
  function renderQuizQuestion() {
    clearQuizTimer();
    const box = currentQuiz.mount || $("#quizRun");
    if (!box || !currentQuiz) return;
    if (currentQuiz.index >= currentQuiz.questions.length) return finishQuiz();
    const q = currentQuiz.questions[currentQuiz.index];
    currentQuiz.selected = null;
    currentQuiz.timeLeft = timerSeconds(currentQuiz.settings);
    box.innerHTML = `<div class="row between"><span class="pill">Question ${currentQuiz.index+1} of ${currentQuiz.questions.length}</span><span class="pill">Unit ${q.unit} • ${q.topic} • ${q.difficulty}</span><span class="timer" id="timerText">${currentQuiz.timeLeft ? currentQuiz.timeLeft + "s" : "No timer"}</span></div>
      <h3>${esc(q.stem)}</h3>${q.type==="graph" ? `<svg viewBox="0 0 370 300" style="max-width:480px;width:100%;border:1px solid var(--line);border-radius:12px">${graphSvg(graphs.find(g=>g[2]===q.unit)?.[0] || "equilibrium")}</svg>` : ""}
      <div class="answer-list">${q.choices.map((c,i)=>`<button class="answer" data-action="answer" data-choice="${i}"><strong>${i+1}</strong><span>${esc(c.text)}</span></button>`).join("")}</div>
      <div id="feedback"></div><div class="row"><button id="nextBtn" class="primary" data-action="nextQuestion" disabled>N Next</button><button data-action="restartQuiz">R Restart quiz</button></div>`;
    if (currentQuiz.timeLeft) startQuizTimer();
  }
  function chooseAnswer(choiceIndex, timedOut = false) {
    if (!currentQuiz || currentQuiz.done) return;
    const q = currentQuiz.questions[currentQuiz.index];
    if (currentQuiz.answers[currentQuiz.index]) return;
    const choice = q.choices[choiceIndex];
    const correct = !!choice?.correct && !timedOut;
    const record = { id: q.id, unit: q.unit, topic: q.topic, type: q.type, difficulty: q.difficulty, stem: q.stem, selected: choice?.text || "No answer", correctAnswer: q.choices.find(c=>c.correct).text, correct, why: choice?.why || "Time expired before an answer was chosen." };
    currentQuiz.answers[currentQuiz.index] = record;
    $$(".answer", currentQuiz.mount || document).forEach((b, i) => {
      b.disabled = true;
      if (q.choices[i].correct) b.classList.add("correct");
      if (i === choiceIndex && !correct) b.classList.add("wrong");
    });
    const next = $("#nextBtn", currentQuiz.mount || document);
    const feedback = $("#feedback", currentQuiz.mount || document);
    if (next) next.disabled = false;
    if (currentQuiz.settings.mode === "Study mode" || timedOut || currentQuiz.settings.mode === "Speed round") {
      if (feedback) feedback.innerHTML = feedbackHtml(q, record, timedOut);
    }
    if (currentQuiz.settings.mode === "Exam mode" || currentQuiz.settings.mode === "Timed mode") {
      if (feedback) feedback.innerHTML = timedOut ? feedbackHtml(q, record, true) : `<div class="feedback muted">Answer saved. Feedback appears at the end in ${currentQuiz.settings.mode}.</div>`;
    }
  }
  function feedbackHtml(q, r, timedOut) {
    const correctChoice = q.choices.find(c => c.correct);
    const wrongChoices = q.choices.filter(c => !c.correct);
    return `<div class="feedback"><strong>${r.correct ? "Correct." : timedOut ? "Time expired." : "Incorrect."}</strong>
      <p><strong>Correct answer:</strong> ${esc(r.correctAnswer)}</p>
      <p><strong>Why the correct answer is correct:</strong> ${esc(q.correctWhy || correctChoice?.why || r.why)}</p>
      ${r.correct ? "" : `<p><strong>Your answer:</strong> ${esc(r.selected)}<br><strong>Why it is wrong:</strong> ${esc(r.why)}</p>`}
      <div><strong>Why the other choices are wrong:</strong><ul>${wrongChoices.map(c=>`<li><strong>${esc(c.text)}:</strong> ${esc(c.why)}</li>`).join("")}</ul></div></div>`;
  }
  function nextQuestion() {
    if (!currentQuiz) return;

  function startQuizTimer() {
    const tick = () => {
      const t = $("#timerText", currentQuiz.mount || document);
      if (t) t.textContent = `${currentQuiz.timeLeft}s`;
      if (currentQuiz.timeLeft <= 0) {
        clearQuizTimer();
        chooseAnswer(-1, true);
        if (currentQuiz.settings.mode === "Speed round") setTimeout(nextQuestion, 700);
        return;

      currentQuiz.timeLeft--;

    tick();

  function clearQuizTimer(){ if (currentQuiz?.timerId) clearInterval(currentQuiz.timerId); if (currentQuiz) currentQuiz.timerId = null; }
  function finishQuiz() {
    clearQuizTimer();
    currentQuiz.done = true;
    const answers = currentQuiz.answers.filter(Boolean);
    const correct = answers.filter(a=>a.correct).length;
    const attemptId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now());
    const attempt = { id: attemptId, date: new Date().toISOString(), settings: currentQuiz.settings, total: currentQuiz.questions.length, correct, seconds: Math.round((Date.now()-currentQuiz.start)/1000), answers };
    state.attempts.unshift(attempt);
    answers.forEach(a => {
      if (!a.correct) state.missed[a.id] = { ...(state.missed[a.id] || {}), ...a, count: (state.missed[a.id]?.count || 0) + 1 };
    });
    updateStreak();
    updateBadges(attempt);
    saveState();
    if (pct(correct, attempt.total) >= 85) confetti();
    const byUnit = groupAccuracy(answers, "unit");
    const byTopic = groupAccuracy(answers, "topic");
    (currentQuiz.mount || $("#quizRun")).innerHTML = `<div class="lesson-block"><h2>Results: ${pct(correct, attempt.total)}% (${correct}/${attempt.total})</h2><p class="muted">Time taken: ${minutes(attempt.seconds*1000)}</p>
      <div class="grid two"><div>${accuracyList("Accuracy by unit", byUnit)}</div><div>${accuracyList("Accuracy by topic", byTopic)}</div></div>
      <p><strong>Easiest topic:</strong> ${bestWorst(byTopic,true)} • <strong>Weakest topic:</strong> ${bestWorst(byTopic,false)}</p>
      <h3>Missed Questions</h3>${answers.filter(a=>!a.correct).map(a=>`<div class="feedback"><strong>${esc(a.topic)}</strong><p>${esc(a.stem)}</p><p>Correct: ${esc(a.correctAnswer)}</p></div>`).join("") || empty("No misses. That was clean.")}
      <div class="row"><button class="primary" data-action="retrySame">Retry same questions</button><button data-action="retryMissed">Retry missed only</button><button data-action="retryRandom">New random quiz with same settings</button><button data-view="history">Quiz history</button></div></div>`;
  }
  function groupAccuracy(items, key) {
    const m = {};
    items.forEach(a => { const k = a[key]; m[k] ||= { correct:0,total:0 }; m[k].total++; if (a.correct) m[k].correct++; });
    return Object.entries(m).map(([name,v]) => ({ name, ...v, pct: pct(v.correct,v.total) })).sort((a,b)=>a.pct-b.pct);
  }
  function accuracyList(title, rows) { return `<h3>${title}</h3>${rows.map(r=>`<p>${esc(r.name)}: ${r.pct}% (${r.correct}/${r.total})</p><div class="progress"><i style="--p:${r.pct}%"></i></div>`).join("")}`; }
  function bestWorst(rows,best) { if (!rows.length) return "Not enough data"; const sorted = [...rows].sort((a,b)=> best ? b.pct-a.pct : a.pct-b.pct); return `${sorted[0].name} (${sorted[0].pct}%)`; }
  function updateStreak() {
    const d = today();
    if (state.streak.date === d) return;
    const y = new Date(Date.now()-86400000).toISOString().slice(0,10);

    state.streak.date = d;
  }

    if (a.answers.some(x=>x.topic.includes("elasticity")) && pct(a.correct,a.total)>=80) add("Elasticity Expert");
    if (a.answers.some(x=>x.type==="graph") && pct(a.correct,a.total)>=80) add("Graph Genius");

  function detailedTermDefinition(term, unit) {
    const t = term.toLowerCase();
    if (t.includes("opportunity cost")) return "Opportunity cost is the next-best alternative sacrificed when a decision is made. In production and trade questions, compute it per unit by dividing what is given up by what is gained.";
    if (t.includes("production possibilities")) return "A PPC is a frontier showing the maximum combinations of two goods that can be produced with current resources and technology. It demonstrates scarcity, trade-offs, efficiency, inefficiency, unattainable output, and economic growth.";
    if (t.includes("comparative advantage")) return "Comparative advantage means producing a good at a lower opportunity cost than another producer. It determines specialization and mutually beneficial trade.";
    if (t.includes("demand")) return "Demand is the full relationship between price and quantity buyers are willing and able to purchase. Non-price shifters move the whole curve; the good's own price causes movement along it.";
    if (t.includes("supply")) return "Supply is the full relationship between price and quantity sellers are willing and able to produce. Input costs, technology, taxes, subsidies, number of sellers, and expectations shift it.";
    if (t.includes("elasticity")) return "Elasticity measures responsiveness using percentage changes. On AP problems, interpret both the coefficient size and the sign when relevant.";
    if (t.includes("surplus")) return "Surplus measures gains from trade on a graph. Consumer surplus is above price and below demand; producer surplus is below price and above supply.";
    if (t.includes("marginal")) return "Marginal means additional. Microeconomics decision rules usually compare marginal benefit/revenue/product with marginal cost/resource cost.";
    if (t.includes("monopoly")) return "A monopoly is a single seller with barriers to entry and market power. It chooses output where MR = MC and charges the price from demand, often creating deadweight loss.";
    if (t.includes("oligopoly") || t.includes("game")) return "Oligopoly involves a few interdependent firms. Game theory explains strategic choices, dominant strategies, Nash equilibrium, collusion, and incentives to cheat.";
    if (t.includes("factor") || t.includes("labor") || t.includes("resource")) return "Factor-market concepts explain how firms hire inputs. Labor demand is derived from product demand and depends on marginal revenue product.";
    if (t.includes("externality")) return "An externality is a side effect on third parties that is not reflected in market prices. Negative externalities tend to overproduce; positive externalities tend to underproduce.";
    if (t.includes("public good")) return "A public good is nonrival and nonexcludable, which creates free-rider problems and private-market underprovision.";
    if (t.includes("common")) return "A common resource is rival and difficult to exclude users from, so individuals may overuse it because they do not bear the full social cost.";
    if (t.includes("asymmetric") || t.includes("adverse") || t.includes("moral")) return "Information problems occur when one side knows more than the other. Adverse selection is hidden information before exchange; moral hazard is hidden action after exchange.";
    return `${itemStyleTerm(term)} is a Unit ${unit?.id || ""} concept tied to ${unit?.topics?.slice(0,3).join(", ") || "AP Micro models"}. For exam answers, give the definition, identify the relevant graph/formula, and explain the economic effect.`;
  }

  async function api(path, options = {}) {

      headers: { "content-type": "application/json", ...(options.headers || {}) },

    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.ok === false) throw new Error(data.error || "Request failed.");
    return data;
  }

  async function loadRemoteProgress(showAlert = true) {

    const render = ({ home: renderHome, lessons: renderLessons, terms: renderTerms, formulas: renderFormulas, graphs: renderGraphs, quiz: renderQuizSetup, exam: renderExamSetup, frq: renderFrq, mistakes: renderMistakes, progress: renderProgress, flashcards: renderFlashcards, history: renderHistory, daily: renderDaily, cheat: renderCheat })[active];
    render?.();
    if (showAlert) alert("Progress loaded from your account.");
  }
  function showFrqRubric(i) {
    const box = $(`#frqRubric${i}`);
    if (box) box.style.display = "block";
    updateFrqScore(i);
    $$(`#frqRubric${i} input[type="checkbox"]`).forEach(cb => cb.onchange = () => updateFrqScore(i));
  }
  function updateFrqScore(i) {
    const f = FRQ_BANK[i];
    const earned = $$(`#frqRubric${i} input[type="checkbox"]`).filter(cb => cb.checked).length;
    const label = $(`#frqScore${i}`);
    if (label && f) label.textContent = `${earned}/${f.points}`;
    return earned;
  }
  function saveFrqScore(i) {
    const f = FRQ_BANK[i];
    if (!f) return;
    const earned = updateFrqScore(i);
    const answer = $(`#frqAnswer${i}`)?.value || "";
    state.frqAttempts = state.frqAttempts || [];
    state.frqAttempts.unshift({ title: f.title, unit: f.unit, score: earned, points: f.points, answer, date: new Date().toISOString() });
    saveState();
    alert(`Saved FRQ self-score: ${earned}/${f.points}`);
    renderFrq();
  }
  function calcElasticity() {
    const oldP=Number($("#oldP").value), newP=Number($("#newP").value), oldQ=Number($("#oldQ").value), newQ=Number($("#newQ").value);
    const pchg = ((newP-oldP)/oldP)*100, qchg = ((newQ-oldQ)/oldQ)*100, e = Math.abs(qchg/pchg);
    $("#elasticityResult").innerHTML = Number.isFinite(e) ? `<strong>Elasticity = ${e.toFixed(2)}</strong><p>Quantity changed ${qchg.toFixed(1)}%; price changed ${pchg.toFixed(1)}%. Demand is ${e>1?"elastic":e<1?"inelastic":"unit elastic"}.</p>` : "Enter nonzero starting values.";
  }
  function retrySame() {
    const ids = currentQuiz.same;
    currentQuiz.questions = ids.map(id => questionBank.find(q=>q.id===id)).filter(Boolean).map(q=>({...q, choices:shuffle(q.choices)}));
    currentQuiz.index=0; currentQuiz.answers=[]; currentQuiz.start=Date.now(); currentQuiz.done=false; renderQuizQuestion();
  }
  function retryMissed() {
    const ids = currentQuiz.answers.filter(a=>!a.correct).map(a=>a.id);
    if (!ids.length) return;
    currentQuiz.questions = ids.map(id => questionBank.find(q=>q.id===id)).filter(Boolean).map(q=>({...q, choices:shuffle(q.choices)}));
    currentQuiz.index=0; currentQuiz.answers=[]; currentQuiz.start=Date.now(); currentQuiz.done=false; renderQuizQuestion();
  }
  function smartQuiz() {
    showView("quiz");
    setTimeout(() => startQuiz(false, { source:"weak", unit:activeUnit, amount:15, difficulty:"Mixed difficulty", mode:"Study mode", order:"missed", timer:"none", customTimer:45, final:false }), 0);
  }
  function randomQuestion() {
    showView("quiz");
    setTimeout(() => startQuiz(false, { source:"mixed", unit:activeUnit, amount:1, difficulty:"Mixed difficulty", mode:"Study mode", order:"random", timer:"none", customTimer:45, final:false }), 0);
  }
  function clearProgress() {
    if (!confirm("Clear all saved lessons, quiz history, missed questions, flashcards, streaks, and badges?")) return;
    localStorage.removeItem(STORE_KEY);
    Object.assign(state, loadState());
    showView("home");
  }
  function exportProgress(){ download("ap-micro-progress.json", JSON.stringify(state,null,2)); }
  function exportHistory(){ download("ap-micro-quiz-history.json", JSON.stringify(state.attempts || [],null,2)); }
  function importProgress(){
    try { const val = JSON.parse($("#importBox").value); Object.assign(state, val); saveState(); alert("Progress imported."); renderProgress(); }
    catch { alert("Import failed. Check that the JSON is valid."); }
  }
  function deleteHistory(){ if(confirm("Delete quiz history and missed-question records?")) { state.attempts=[]; state.missed={}; saveState(); renderHistory(); } }
  function download(name, text) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([text], {type:"application/json"}));
    a.download = name; a.click(); URL.revokeObjectURL(a.href);
  }
  function reviewAttempt(id) {
    const a = (state.attempts||[]).find(x=>x.id===id); if (!a) return;
    $("#historyView").innerHTML = `<div class="section-title"><h2>Attempt Review</h2><button data-view="history">Back to history</button></div>${a.answers.map(ans=>`<article class="card"><span class="pill">${ans.correct?"Correct":"Missed"} • Unit ${ans.unit}</span><h3>${esc(ans.topic)}</h3><p>${esc(ans.stem)}</p><p class="muted">Your answer: ${esc(ans.selected)}<br>Correct: ${esc(ans.correctAnswer)}</p></article>`).join("")}`;
  }
  function openCommand() {
    const cmds = [
      ...pages.map(p => ({ label:p[2], run:()=>showView(p[0]) })),
      ...units.map(u => ({ label:`Study Unit ${u.id}: ${u.title}`, run:()=>{activeUnit=u.id; showView("lessons");} })),
      ...graphs.map(g => ({ label:`Graph: ${g[1]}`, run:()=>showView("graphs") }))
    ];
    const render = () => {
      const q = ($("#commandSearch").value || "").toLowerCase();
      $("#commandList").innerHTML = cmds.filter(c=>c.label.toLowerCase().includes(q)).slice(0,20).map((c,i)=>`<button data-cmd="${i}">${esc(c.label)}</button>`).join("");
      $$("#commandList button").forEach((b,i)=>b.onclick=()=>{ cmds.filter(c=>c.label.toLowerCase().includes(q))[i].run(); closeModals(); });
    };
    $("#commandModal").classList.add("active");
    $("#commandSearch").value = "";
    $("#commandSearch").oninput = render;
    render();
    setTimeout(()=>$("#commandSearch").focus(), 20);
  }
  function confetti() {
    for (let i=0;i<70;i++) {
      const d=document.createElement("div");
      d.className="confetti";
      d.style.left=Math.random()*100+"vw";
      d.style.top="-20px";
      d.style.background=[unitColors[i%6],"#fff","#f5c542"][i%3];
      d.style.animationDelay=Math.random()*.35+"s";
      document.body.appendChild(d);
      setTimeout(()=>d.remove(),2200);
    }
  }

  async function init() {
    renderShared();
    renderNav("home");
    renderHome();
    bindEvents();
    await checkSession();
  }
  init();
  </script>
</body>
</html>
