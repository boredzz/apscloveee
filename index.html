<!doctype html><html lang='en'><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>NoteCore</title><link rel='stylesheet' href='/assets/styles.css'></head><body>
<div class='app'>
<aside class='sidebar' id='sidebar'><div class='brand'><div class='logo'>NC</div><div><h1>NoteCore</h1><p>Smart AP study platform</p></div></div><div class='side-actions'><a href='/'><button class='outline'>Home</button></a><a href='/?view=subjects'><button class='outline'>Subjects</button></a><a href='/?view=bookmarks'><button class='outline'>Saved Notes</button></a><a href='/admin/'><button class='outline'>Admin Panel</button></a></div><p class='muted'>Categories</p><div id='categoryTree'></div></aside>
<main class='main'><header class='topbar'><button id='menuBtn' class='mobile-menu mini'>☰</button><div class='search-wrap'><input id='searchInput' placeholder='Search notes, topics, tags...'><div id='suggestions' class='suggestions'></div></div><div class='userbar'><span id='userLabel' class='muted'>Guest</span><button id='logoutBtn' class='mini outline' style='display:none'>Logout</button><button id='loginBtn' class='mini outline'>Sign In</button><button id='registerBtn' class='mini'>Register</button></div></header><section id='view' class='content'></section><footer id='footer' class='footer'></footer></main>
</div>
<div class='modal' id='loginModal'><div class='modal-card'><h2>Sign In</h2><button id='closeAuth' class='mini outline' type='button'>Close</button><form id='loginForm' class='single-auth'><input id='loginUsername' placeholder='Username' required><input id='loginPassword' type='password' placeholder='Password' required><button type='submit'>Log In</button></form></div></div>
<div class='modal' id='registerModal'><div class='modal-card'><h2>Create Account</h2><button id='closeRegister' class='mini outline' type='button'>Close</button><form id='registerForm' class='single-auth'><input id='regFirstName' placeholder='First name' required><input id='regLastName' placeholder='Last name' required><input id='regUsername' placeholder='Username' required><input id='regPassword' type='password' placeholder='Password (min 8 chars)' required><input id='regConfirmPassword' type='password' placeholder='Confirm password' required><button type='submit'>Register</button></form></div></div><div id='toast' class='toast'></div>
<script src='/assets/app.js' defer></script></body></html>
