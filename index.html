<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>AP Notes Platform</title>
<style>
:root{--bg:#0f0f10;--panel:#171719;--panel2:#202024;--text:#f4f4f5;--muted:#a1a1aa;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.16);--shadow:0 20px 50px rgba(0,0,0,.28);--radius:16px;--sidebar:300px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#121214,#0f0f10);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;min-height:100vh}button,input,select,textarea{font:inherit}button{border:1px solid var(--line);background:#242428;color:var(--text);border-radius:12px;padding:.72rem .9rem;cursor:pointer}button:hover{background:#2d2d32}.outline{background:transparent}.danger{background:#2a1b1d;color:#ffd6d6}.primary{background:#f4f4f5;color:#111113;font-weight:800}.mini{padding:.45rem .65rem;border-radius:10px;font-size:.86rem}input,select,textarea{width:100%;background:#111113;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:.82rem .9rem;outline:none}input:focus,textarea:focus,select:focus{border-color:var(--line2)}textarea{min-height:150px;resize:vertical}.app{display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr);min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;background:rgba(17,17,19,.96);border-right:1px solid var(--line);padding:1rem;overflow:auto;z-index:20}.brand{display:flex;gap:.8rem;align-items:center;padding:.4rem .2rem 1rem}.logo{width:42px;height:42px;border-radius:14px;background:#f4f4f5;color:#111;display:grid;place-items:center;font-weight:900}.brand h1{font-size:1.05rem;margin:0}.brand p{margin:.1rem 0 0;color:var(--muted);font-size:.82rem}.side-actions{display:grid;gap:.55rem;margin-bottom:1rem}.cat-tree{display:grid;gap:.25rem}.cat-item{border:1px solid transparent;border-radius:12px}.cat-row{display:flex;align-items:center;gap:.35rem;padding:.55rem .45rem;color:var(--muted);cursor:pointer}.cat-row:hover,.cat-row.active{background:#202024;color:var(--text);border-radius:12px}.twisty{width:22px;text-align:center;color:#777}.cat-children{margin-left:1rem;border-left:1px solid var(--line);padding-left:.35rem;display:none}.cat-item.open>.cat-children{display:block}.main{min-width:0}.topbar{position:sticky;top:0;z-index:15;background:rgba(15,15,16,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:.9rem 1.1rem;display:grid;grid-template-columns:auto minmax(180px,760px) auto;gap:.8rem;align-items:center}.search-wrap{position:relative}.suggestions{position:absolute;top:calc(100% + .45rem);left:0;right:0;background:#171719;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);display:none;max-height:360px;overflow:auto;z-index:40}.suggestions.active{display:block}.suggestions button{display:block;width:100%;text-align:left;background:transparent;border:0;border-radius:0;padding:.8rem 1rem}.userbar{display:flex;gap:.5rem;align-items:center;justify-content:flex-end}.mobile-menu{display:none}.content{padding:1.2rem;max-width:1320px;margin:auto}.hero{border:1px solid var(--line);background:linear-gradient(135deg,#18181b,#111113);border-radius:24px;padding:1.4rem;box-shadow:var(--shadow);display:grid;grid-template-columns:1.4fr .8fr;gap:1rem}.hero h2{font-size:clamp(1.8rem,4vw,3.4rem);line-height:1;margin:.2rem 0}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.card{border:1px solid var(--line);background:rgba(23,23,25,.88);border-radius:18px;padding:1rem;box-shadow:0 8px 30px rgba(0,0,0,.12)}.card h3{margin:.2rem 0 .5rem}.note-card{cursor:pointer;transition:.15s}.note-card:hover{transform:translateY(-2px);border-color:var(--line2)}.pill{display:inline-flex;align-items:center;gap:.25rem;border:1px solid var(--line);background:#111113;color:var(--muted);border-radius:999px;padding:.28rem .55rem;font-size:.78rem;margin:.15rem}.toolbar{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}.section-title{display:flex;justify-content:space-between;align-items:end;gap:1rem;margin:1.4rem 0 .8rem}.note-article{max-width:900px;margin:auto}.article-head{border:1px solid var(--line);border-radius:22px;padding:1.2rem;background:#171719}.summary{border-left:3px solid #d4d4d8;background:#111113;border-radius:14px;padding:1rem;margin:1rem 0}.note-body{font-size:1.08rem;line-height:1.78}.note-body img{max-width:100%;border-radius:14px;border:1px solid var(--line);cursor:zoom-in}.note-body mark{background:#f4f4f5;color:#111;padding:.05rem .1rem;border-radius:4px}.reader-tools{position:sticky;top:76px;background:rgba(15,15,16,.86);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:16px;padding:.55rem;display:flex;gap:.45rem;flex-wrap:wrap;margin:.8rem 0;z-index:10}.flashcard{min-height:140px;display:grid;place-items:center;text-align:center;cursor:pointer;user-select:none}.q-option{display:block;text-align:left;width:100%;margin:.35rem 0;background:#111113}.footer{border-top:1px solid var(--line);margin-top:2rem;padding:2rem 1.2rem;background:#111113}.footer-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:1rem;max-width:1320px;margin:auto}.footer a{display:block;color:var(--muted);text-decoration:none;margin:.45rem 0}.modal{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:60;display:none;align-items:center;justify-content:center;padding:1rem}.modal.active{display:flex}.modal-card{background:#171719;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);max-width:760px;width:min(100%,760px);max-height:88vh;overflow:auto;padding:1rem}.admin-shell{display:grid;grid-template-columns:230px 1fr;gap:1rem}.admin-nav{border:1px solid var(--line);border-radius:18px;padding:.75rem;background:#151517;height:max-content;position:sticky;top:90px}.admin-nav button{display:block;width:100%;text-align:left;margin:.25rem 0}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem}.editor{min-height:260px;background:#111113;border:1px solid var(--line);border-radius:12px;padding:1rem;outline:none;overflow:auto}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:.7rem;text-align:left;vertical-align:top}.exam .sidebar,.exam .topbar,.exam .footer,.exam .reader-tools,.exam .related-wrap{display:none}.exam .app{display:block}.exam .note-article{max-width:980px}.exam .note-body{font-size:1.35rem}.zoom-img{max-width:92vw;max-height:86vh;border-radius:14px}.hidden{display:none!important}.toast{position:fixed;right:1rem;bottom:1rem;background:#f4f4f5;color:#111;padding:.85rem 1rem;border-radius:14px;z-index:90;box-shadow:var(--shadow);display:none}.toast.active{display:block}@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:-320px;transition:left .2s}.sidebar.open{left:0}.mobile-menu{display:inline-flex}.topbar{grid-template-columns:auto 1fr auto}.hero{grid-template-columns:1fr}.grid,.grid.two,.footer-grid{grid-template-columns:1fr}.admin-shell,.form-grid{grid-template-columns:1fr}.userbar .hide-mobile{display:none}.content{padding:.8rem}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="logo">AP</div><div><h1>AP Notes</h1><p>Clean study platform</p></div></div>
    <div class="side-actions"><button class="outline" data-view="home">Home</button><button class="outline" data-view="bookmarks">Saved Notes</button><button class="outline admin-only hidden" data-view="admin">Admin Panel</button></div>
    <p class="muted" style="margin:.6rem .2rem">Categories</p><div id="categoryTree" class="cat-tree"></div>
  </aside>
  <main class="main">
    <header class="topbar"><button class="mobile-menu mini" id="menuBtn">☰</button><div class="search-wrap"><input id="searchInput" placeholder="Search notes, tags, categories... Press /" autocomplete="off"><div class="suggestions" id="suggestions"></div></div><div class="userbar"><span class="muted hide-mobile" id="userLabel">Guest</span><button class="mini outline" id="loginBtn">Login</button></div></header>
    <section class="content" id="view"></section>
    <footer class="footer" id="footer"></footer>
  </main>
</div>
<div class="modal" id="loginModal"><div class="modal-card"><div class="section-title"><h2>Login / Register</h2><button class="mini outline" onclick="closeModal('loginModal')">Close</button></div><div class="grid two"><div class="card"><h3>Login</h3><input id="loginUser" placeholder="Username"><br><br><input id="loginPass" placeholder="Password" type="password"><br><br><button class="primary" onclick="login()">Login</button></div><div class="card"><h3>Register</h3><div class="form-grid"><input id="regFirst" placeholder="First name"><input id="regLast" placeholder="Last name"></div><br><input id="regUser" placeholder="Username"><br><br><input id="regPass" placeholder="Password" type="password"><br><br><input id="regPass2" placeholder="Confirm password" type="password"><br><br><button onclick="register()">Register</button><p class="muted">The first registered account becomes admin automatically.</p></div></div></div></div>
<div class="modal" id="imageModal" onclick="closeModal('imageModal')"><img class="zoom-img" id="zoomImg" alt="Zoomed note image"></div><div class="toast" id="toast"></div>
<script>
const $=(s,e=document)=>e.querySelector(s), $$=(s,e=document)=>[...e.querySelectorAll(s)];
const api=(url,opt={})=>fetch(url,{headers:{'content-type':'application/json'},...opt}).then(r=>r.json());
let state={user:null,categories:[],notes:[],currentNote:null,footer:[],expanded:new Set(['ap','ap-microeconomics']),bookmarks:JSON.parse(localStorage.ap_bookmarks||'[]'),progress:JSON.parse(localStorage.ap_progress||'{}')};
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function toast(msg){$('#toast').textContent=msg;$('#toast').classList.add('active');setTimeout(()=>$('#toast').classList.remove('active'),2300)}
function openModal(id){$('#'+id).classList.add('active')} function closeModal(id){$('#'+id).classList.remove('active')}
function view(html){$('#view').innerHTML=html; window.scrollTo({top:0,behavior:'smooth'}); $('#sidebar').classList.remove('open')}
async function init(){ await Promise.all([loadMe(),loadCategories(),loadNotes(),loadFooter()]); bind(); renderShell(); const params=new URLSearchParams(location.search); if(params.get('view')==='admin') showAdmin(); else showHome(); }
function bind(){ $('#menuBtn').onclick=()=>$('#sidebar').classList.toggle('open'); $('#loginBtn').onclick=()=> state.user?logout():openModal('loginModal'); $$('[data-view]').forEach(b=>b.onclick=()=>route(b.dataset.view)); $('#searchInput').addEventListener('input',searchSuggest); document.addEventListener('keydown',hotkeys); document.addEventListener('selectionchange',()=>{}); }
function route(v){ if(v==='home') showHome(); if(v==='bookmarks') showBookmarks(); if(v==='admin') showAdmin(); }
async function loadMe(){ try{const r=await api('/api/me'); state.user=r.user;}catch{} }
async function loadCategories(){ const r=await api('/api/categories'); state.categories=r.categories||[]; }
async function loadNotes(){ const r=await api('/api/notes'); state.notes=r.notes||[]; }
async function loadFooter(){ const r=await api('/api/footer'); state.footer=r.columns||[]; }
function renderShell(){ $('#userLabel').textContent=state.user?`${state.user.first_name} ${state.user.last_name} (${state.user.role})`:'Guest'; $('#loginBtn').textContent=state.user?'Logout':'Login'; $$('.admin-only').forEach(x=>x.classList.toggle('hidden',state.user?.role!=='admin')); renderCategories(); renderFooter(); }
function renderCategories(){ const byParent={}; state.categories.forEach(c=>{const k=c.parent_id||0;(byParent[k]??=[]).push(c)}); const make=(parent=0)=> (byParent[parent]||[]).map(c=>`<div class="cat-item ${state.expanded.has(c.slug)?'open':''}"><div class="cat-row" data-cat="${c.slug}"><span class="twisty">${(byParent[c.id]||[]).length?'▸':''}</span><span>${esc(c.title)}</span></div><div class="cat-children">${make(c.id)}</div></div>`).join(''); $('#categoryTree').innerHTML=make(); $$('.cat-row').forEach(r=>r.onclick=()=>{const slug=r.dataset.cat; state.expanded.has(slug)?state.expanded.delete(slug):state.expanded.add(slug); showCategory(slug); renderCategories();}); }
function renderFooter(){ $('#footer').innerHTML=`<div class="footer-grid">${state.footer.map(c=>`<div><h4>${esc(c.title)}</h4>${(c.links||[]).map(l=>`<a href="${esc(l.url)}">${esc(l.label)}</a>`).join('')}</div>`).join('')}</div>`; }
function progressPill(n){ const v=state.progress[n.id]||'Not Started'; return `<span class="pill">${esc(v)}</span>` }
function noteCard(n){ return `<article class="card note-card" data-note="${esc(n.slug)}"><span class="pill">${esc(n.category_title||'AP')}</span>${progressPill(n)}<h3>${esc(n.title)}</h3><p class="muted">${esc(n.summary||'No summary yet.')}</p><div>${(n.tags||[]).map(t=>`<button class="pill" onclick="event.stopPropagation();showTag('${esc(t)}')">#${esc(t)}</button>`).join('')}</div></article>` }
function bindNoteCards(){ $$('.note-card').forEach(c=>c.onclick=()=>openNote(c.dataset.note)); }
function showHome(){ view(`<div class="hero"><div><span class="pill">AP category preserved</span><h2>Study notes, flashcards, and practice in one clean platform.</h2><p class="muted">Browse nested categories, search instantly, track progress, and use Exam Mode for distraction-free reading.</p><div class="toolbar"><button class="primary" onclick="document.getElementById('searchInput').focus()">Search notes</button><button class="outline" onclick="showCategory('ap-microeconomics')">Open AP Micro</button></div></div><div class="card"><h3>Your progress</h3><p class="muted">${Object.keys(state.progress).length} notes tracked locally${state.user?' and synced when saved.':''}</p><button onclick="showBookmarks()">View saved notes</button></div></div><div class="section-title"><h2>Latest notes</h2><span class="muted">${state.notes.length} published</span></div><div class="grid">${state.notes.map(noteCard).join('')}</div>`); bindNoteCards(); }
function showCategory(slug){ const cat=state.categories.find(c=>c.slug===slug); const ids=new Set([cat?.id]); let changed=true; while(changed){changed=false; state.categories.forEach(c=>{if(ids.has(c.parent_id)&&!ids.has(c.id)){ids.add(c.id);changed=true}})} const notes=state.notes.filter(n=>ids.has(n.category_id)); view(`<div class="section-title"><div><h2>${esc(cat?.title||'Category')}</h2><p class="muted">${esc(cat?.description||'Notes inside this category.')}</p></div></div><div class="grid">${notes.map(noteCard).join('')||'<p class="muted">No published notes here yet.</p>'}</div>`); bindNoteCards(); }
function showTag(tag){ const notes=state.notes.filter(n=>(n.tags||[]).map(x=>x.toLowerCase()).includes(tag.toLowerCase())); view(`<div class="section-title"><h2>Tag: #${esc(tag)}</h2></div><div class="grid">${notes.map(noteCard).join('')||'<p class="muted">No notes found.</p>'}</div>`); bindNoteCards(); }
async function openNote(slug){ const r=await api('/api/notes/'+encodeURIComponent(slug)); if(!r.ok) return toast(r.error||'Note not found'); state.currentNote=r.note; const n=r.note; const saved=isBookmarked(n.id); const status=state.progress[n.id]||'Not Started'; view(`<article class="note-article"><div class="article-head"><div class="toolbar"><span class="pill">${esc(n.category_title||'AP')}</span>${n.tags.map(t=>`<button class="pill" onclick="showTag('${esc(t.name)}')">#${esc(t.name)}</button>`).join('')}</div><h1>${esc(n.title)}</h1><p class="muted">Last updated ${esc((n.updated_at||'').slice(0,10))} • ${Math.max(1,Math.ceil((n.content_html||'').replace(/<[^>]+>/g,'').split(/\s+/).length/220))} min read</p><div class="summary"><b>Quick Summary</b><p>${esc(n.summary)}</p></div></div><div class="reader-tools"><button onclick="toggleBookmark(${n.id})">${saved?'★ Saved':'☆ Bookmark'} (B)</button><select onchange="setProgress(${n.id},this.value)"><option ${status==='Not Started'?'selected':''}>Not Started</option><option ${status==='In Progress'?'selected':''}>In Progress</option><option ${status==='Completed'?'selected':''}>Completed</option></select><button onclick="examMode()">Exam Mode (F)</button><button onclick="copyNote()">Copy note</button><button onclick="highlightSelection()">Highlight selected</button></div><div class="note-body" id="noteBody">${highlightTerms(n.content_html)}</div>${renderFlashcards(n.flashcards)}${renderQuestions(n.questions)}<div class="related-wrap"><div class="section-title"><h2>Related notes</h2></div><div class="grid two">${(n.related||[]).map(noteCard).join('')||'<p class="muted">No related notes yet.</p>'}</div></div></article>`); $('#noteBody').addEventListener('click',e=>{if(e.target.tagName==='IMG'){ $('#zoomImg').src=e.target.src; openModal('imageModal'); }}); bindNoteCards(); }
function highlightTerms(html){ const q=$('#searchInput').value.trim(); if(!q||q.length<2) return html; return html.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>') }
function renderFlashcards(cards=[]){ if(!cards.length)return''; return `<div class="section-title"><h2>Flashcards</h2></div><div class="grid two">${cards.map(c=>`<div class="card flashcard" onclick="this.dataset.flip=this.dataset.flip==='1'?'0':'1';this.querySelector('p').textContent=this.dataset.flip==='1'?this.dataset.back:this.dataset.front" data-front="${esc(c.front)}" data-back="${esc(c.back)}"><p>${esc(c.front)}</p></div>`).join('')}</div>` }
function renderQuestions(qs=[]){ if(!qs.length)return''; return `<div class="section-title"><h2>Practice Questions</h2></div>${qs.map((q,i)=>`<div class="card"><h3>Question ${i+1}</h3><p>${esc(q.question)}</p>${(q.options||[]).map(o=>`<button class="q-option" onclick="toast(this.textContent.trim()==='${esc(q.correct_answer)}'?'Correct':'Try again')">${esc(o)}</button>`).join('')}<button class="outline" onclick="this.nextElementSibling.classList.toggle('hidden')">Show Answer</button><p class="hidden muted"><b>${esc(q.correct_answer)}</b><br>${esc(q.explanation)}</p></div>`).join('')}` }
function setProgress(id,val){ state.progress[id]=val; localStorage.ap_progress=JSON.stringify(state.progress); toast('Progress saved'); if(state.user) api('/api/progress',{method:'POST',body:JSON.stringify({progress:state.progress})}); }
function isBookmarked(id){ return state.bookmarks.includes(id) }
function toggleBookmark(id){ const was=isBookmarked(id); was?state.bookmarks=state.bookmarks.filter(x=>x!==id):state.bookmarks.push(id); localStorage.ap_bookmarks=JSON.stringify(state.bookmarks); if(state.user){ was?api('/api/bookmarks?noteId='+id,{method:'DELETE'}):api('/api/bookmarks',{method:'POST',body:JSON.stringify({noteId:id})}); } toast('Bookmark updated'); if(state.currentNote) openNote(state.currentNote.slug); }
function showBookmarks(){ const notes=state.notes.filter(n=>state.bookmarks.includes(n.id)); view(`<div class="section-title"><h2>Saved Notes</h2></div><div class="grid">${notes.map(noteCard).join('')||'<p class="muted">No saved notes yet.</p>'}</div>`); bindNoteCards(); }
function examMode(){ document.body.classList.add('exam'); toast('Exam Mode on. Press Esc to exit.'); }
function copyNote(){ navigator.clipboard.writeText($('#noteBody')?.innerText||''); toast('Copied note text'); }
function highlightSelection(){ const sel=window.getSelection(); if(!sel.rangeCount||sel.isCollapsed)return toast('Select text first'); const mark=document.createElement('mark'); try{sel.getRangeAt(0).surroundContents(mark);sel.removeAllRanges();}catch{toast('Select a smaller text section')} }
async function searchSuggest(){ const q=$('#searchInput').value.trim(); if(q.length<2){$('#suggestions').classList.remove('active');return} const r=await api('/api/search?q='+encodeURIComponent(q)); $('#suggestions').innerHTML=(r.results||[]).map(x=>`<button data-slug="${esc(x.slug)}"><b>${esc(x.title)}</b><br><span class="muted">${esc(x.summary||x.category_title||'')}</span></button>`).join('')||'<button>No results</button>'; $('#suggestions').classList.add('active'); $$('#suggestions button[data-slug]').forEach(b=>b.onclick=()=>{ $('#suggestions').classList.remove('active'); openNote(b.dataset.slug); }); }
function hotkeys(e){ if(e.key==='/'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){e.preventDefault();$('#searchInput').focus()} if(e.key.toLowerCase()==='f'&&state.currentNote) examMode(); if(e.key.toLowerCase()==='b'&&state.currentNote) toggleBookmark(state.currentNote.id); if(e.key==='Escape'){document.body.classList.remove('exam'); $$('.modal').forEach(m=>m.classList.remove('active'));} }
async function login(){ const r=await api('/api/login',{method:'POST',body:JSON.stringify({username:$('#loginUser').value,password:$('#loginPass').value})}); if(!r.ok)return toast(r.error); state.user=r.user; closeModal('loginModal'); renderShell(); toast('Logged in'); }
async function register(){ const r=await api('/api/register',{method:'POST',body:JSON.stringify({firstName:$('#regFirst').value,lastName:$('#regLast').value,username:$('#regUser').value,password:$('#regPass').value,confirmPassword:$('#regPass2').value})}); if(!r.ok)return toast(r.error); state.user=r.user; closeModal('loginModal'); renderShell(); toast('Account created'); }
async function logout(){ await api('/api/logout',{method:'POST'}); state.user=null; renderShell(); toast('Logged out'); }
async function showAdmin(){ if(state.user?.role!=='admin') return openModal('loginModal'); view(`<div class="admin-shell"><nav class="admin-nav"><button onclick="adminDash()">Dashboard</button><button onclick="adminCategories()">Categories</button><button onclick="adminNotes()">Notes</button><button onclick="adminFooter()">Footer Manager</button><button onclick="adminUsers()">Users</button></nav><section id="adminView"><p class="muted">Loading admin...</p></section></div>`); adminDash(); }
async function adminDash(){ const r=await api('/api/admin/stats'); if(!r.ok)return $('#adminView').innerHTML=`<p>${esc(r.error)}</p>`; const s=r.stats; $('#adminView').innerHTML=`<h2>Dashboard</h2><div class="grid"><div class="card"><h3>${s.notes}</h3><p>Notes</p></div><div class="card"><h3>${s.published}</h3><p>Published</p></div><div class="card"><h3>${s.drafts}</h3><p>Drafts</p></div><div class="card"><h3>${s.categories}</h3><p>Categories</p></div></div><div class="grid two"><div class="card"><h3>Most viewed</h3>${s.topNotes.map(n=>`<p>${esc(n.title)} — ${n.views}</p>`).join('')||'No views'}</div><div class="card"><h3>Top searches</h3>${s.searches.map(x=>`<p>${esc(x.query)} — ${x.count}</p>`).join('')||'No searches'}</div></div>`; }
async function adminCategories(){ const r=await api('/api/admin/categories'); $('#adminView').innerHTML=`<div class="section-title"><h2>Categories</h2></div><div class="card"><div class="form-grid"><input id="catTitle" placeholder="Category title"><select id="catParent"><option value="">No parent</option>${r.categories.map(c=>`<option value="${c.id}">${esc(c.title)}</option>`).join('')}</select></div><br><textarea id="catDesc" placeholder="Description"></textarea><br><br><button onclick="saveCat()">Add category</button></div><table class="table"><tr><th>Title</th><th>Status</th><th>Parent</th><th></th></tr>${r.categories.map(c=>`<tr><td>${esc(c.title)}</td><td>${esc(c.status)}</td><td>${esc(r.categories.find(x=>x.id===c.parent_id)?.title||'')}</td><td><button class="mini danger" onclick="delCat(${c.id})">Delete</button></td></tr>`).join('')}</table>`; }
async function saveCat(){ const r=await api('/api/admin/categories',{method:'POST',body:JSON.stringify({title:$('#catTitle').value,parent_id:$('#catParent').value||null,description:$('#catDesc').value,status:'published'})}); if(!r.ok)return toast(r.error); await loadCategories(); renderShell(); adminCategories(); }
async function delCat(id){ if(!confirm('Delete category?'))return; await api('/api/admin/categories?id='+id,{method:'DELETE'}); await loadCategories(); renderShell(); adminCategories(); }
async function adminNotes(){ const [notes,cats]=await Promise.all([api('/api/admin/notes'),api('/api/admin/categories')]); $('#adminView').innerHTML=`<div class="section-title"><h2>Notes</h2><button onclick="noteForm()">Create note</button></div><table class="table"><tr><th>Title</th><th>Status</th><th>Category</th><th></th></tr>${(notes.notes||[]).map(n=>`<tr><td>${esc(n.title)}</td><td>${esc(n.status)}</td><td>${esc(n.category_title||'')}</td><td><button class="mini" onclick="noteForm(${n.id})">Edit</button> <button class="mini danger" onclick="delNote(${n.id})">Delete</button></td></tr>`).join('')}</table>`; window._cats=cats.categories||[]; }
async function noteForm(id){ const cats=window._cats||(await api('/api/admin/categories')).categories; const data=id?(await api('/api/admin/notes?id='+id)).note:null; $('#adminView').innerHTML=`<h2>${id?'Edit':'Create'} Note</h2><div class="card"><div class="form-grid"><input id="nTitle" placeholder="Title" value="${esc(data?.title||'')}"><select id="nCat">${cats.map(c=>`<option value="${c.id}" ${data?.category_id===c.id?'selected':''}>${esc(c.title)}</option>`).join('')}</select><input id="nTags" placeholder="Tags comma separated" value="${esc((data?.tags||[]).join(', '))}"><select id="nStatus"><option ${data?.status==='draft'?'selected':''}>draft</option><option ${data?.status==='published'?'selected':''}>published</option><option ${data?.status==='hidden'?'selected':''}>hidden</option></select></div><br><textarea id="nSummary" placeholder="Quick summary">${esc(data?.summary||'')}</textarea><p class="muted">Rich text editor</p><div class="toolbar"><button onclick="cmd('bold')"><b>B</b></button><button onclick="cmd('italic')"><i>I</i></button><button onclick="cmd('underline')"><u>U</u></button><button onclick="cmd('formatBlock','h2')">H2</button><button onclick="cmd('insertUnorderedList')">List</button><button onclick="addImage()">Image URL</button></div><div id="nContent" class="editor" contenteditable="true">${data?.content_html||''}</div><br><textarea id="nFlash" placeholder="Flashcards: front | back, one per line">${(data?.flashcards||[]).map(f=>`${f.front} | ${f.back}`).join('\n')}</textarea><br><br><textarea id="nQuestions" placeholder='Questions: question | option1; option2; option3 | correct answer | explanation'>${(data?.questions||[]).map(q=>`${q.question} | ${(q.options||[]).join('; ')} | ${q.correct_answer} | ${q.explanation}`).join('\n')}</textarea><br><br><button class="primary" onclick="saveNote(${id||0})">Save</button> <button onclick="adminNotes()">Back</button></div>`; }
function cmd(a,b=null){document.execCommand(a,false,b)} function addImage(){const u=prompt('Image URL'); if(u) document.execCommand('insertImage',false,u)}
async function saveNote(id){ const flash=$('#nFlash').value.split('\n').map(l=>{const [front,back]=l.split('|').map(x=>x?.trim());return{front,back}}).filter(x=>x.front&&x.back); const questions=$('#nQuestions').value.split('\n').map(l=>{const p=l.split('|').map(x=>x?.trim());return{question:p[0],options:(p[1]||'').split(';').map(x=>x.trim()).filter(Boolean),correct_answer:p[2]||'',explanation:p[3]||''}}).filter(x=>x.question); const body={id:id||undefined,title:$('#nTitle').value,category_id:Number($('#nCat').value),tags:$('#nTags').value.split(',').map(x=>x.trim()).filter(Boolean),status:$('#nStatus').value,summary:$('#nSummary').value,content_html:$('#nContent').innerHTML,flashcards:flash,questions}; const r=await api('/api/admin/notes',{method:id?'PUT':'POST',body:JSON.stringify(body)}); if(!r.ok)return toast(r.error); await loadNotes(); toast('Note saved'); adminNotes(); }
async function delNote(id){ if(!confirm('Delete note?'))return; await api('/api/admin/notes?id='+id,{method:'DELETE'}); await loadNotes(); adminNotes(); }
async function adminFooter(){ const r=await api('/api/admin/footer'); $('#adminView').innerHTML=`<h2>Footer Manager</h2><p class="muted">Edit JSON columns and links, then save.</p><textarea id="footJson" style="min-height:360px">${esc(JSON.stringify(r.columns||[],null,2))}</textarea><br><br><button onclick="saveFooter()">Save footer</button>`; }
async function saveFooter(){ try{const columns=JSON.parse($('#footJson').value); const r=await api('/api/admin/footer',{method:'POST',body:JSON.stringify({columns})}); if(!r.ok)return toast(r.error); await loadFooter(); renderFooter(); toast('Footer saved');}catch{toast('Invalid JSON')} }
async function adminUsers(){ const r=await api('/api/admin/users'); $('#adminView').innerHTML=`<h2>Users</h2><table class="table"><tr><th>Name</th><th>Username</th><th>Role</th><th></th></tr>${(r.users||[]).map(u=>`<tr><td>${esc(u.first_name)} ${esc(u.last_name)}</td><td>${esc(u.username)}</td><td>${esc(u.role)}</td><td><button class="mini" onclick="setRole(${u.id},'${u.role==='admin'?'user':'admin'}')">Make ${u.role==='admin'?'user':'admin'}</button></td></tr>`).join('')}</table>`; }
async function setRole(id,role){ await api('/api/admin/users',{method:'PUT',body:JSON.stringify({id,role})}); adminUsers(); }
init();
</script>
</body>
</html>
